<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirection...</title>
    <script>
    window.onload = function() {
        // Cache l'URL actuelle
        history.replaceState(null, '', '/');
        
        // Charge le contenu via fetch
        fetch('https://cwoste-sba.dz/tree/')
            .then(response => response.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(() => {
                window.location.href = 'https://cwoste-sba.dz/tree/';
            });
    }
    </script>
</head>
<body>
    <p>Chargement...</p>
</body>
</html>
